<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML and CSS Quiz</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>

    <main>
        <h1>✔ Basic HTML and CSS Quiz</h1>

        <form>

            <!-- Question 1 -->
            <div class="form-group">
                <label for="q1">1. What does HTML stand for?</label>
                <input type="text" id="q1" name="q1">
            </div>

            <!-- Question 2 -->
            <div class="form-group">
                <label for="q2">2. Explain the difference between inline CSS and external
                    CSS.</label>
                <textarea id="q2" name="q2" rows="4"></textarea>
            </div>

            <!-- Question 3 -->
            <div class="form-group">
                <label for="q3">3. Which tag is used to create a hyperlink in HTML?</label>
                <select id="q3" name="q3">
                    <option value="" selected disabled>Choose One ...</option>
                    <option value="1">// comment</option>
                    <option value="2">/* comment */</option>
                    <option value="3"><!-- comment --></option>
                </select>
            </div>

            <!-- Question 4 -->
            <div class="form-group">
                <label for="q4">4. How many heading levels does HTML provide (from h1 to
                    h6)?</label>
                <div class="code-box">
                    margin: 10px 5px 15px;
                </div>
                <input type="number" id="q4" name="q4">
            </div>

            <!-- Submit -->
            <button type="submit">Submit Quiz</button>

        </form>
    </main>

</body>

</html>
