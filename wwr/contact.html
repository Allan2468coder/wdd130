<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Contact White Water Rafting Adventures. Find our address, phone, email, and reach out with questions.">
    <meta name="author" content="Ogwal Allan">
    <title>Contact Us - White Water Rafting Adventures</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo.jpg" alt="Rafting Company Logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Contact Info + Map + Form side by side -->
        <section class="contact-section">
            <h2>White Water Rafting Company</h2>
            <div class="contact-grid">
                <!-- Left: Company Info + Map -->
                <div class="company-info">
                    <p><strong>Address:</strong> 123 Main River Street, Kolob, California</p>
                    <p><strong>Phone:</strong> +1 999 999 9999</p>
                    <p><strong>Email:</strong> info@whitewater.com</p>
                    <div class="map">
                        <iframe
                          src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d63836.006957939324!2d32.581222399999994!3d0.3342336!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1sen!2sug!4v1775297946904!5m2!1sen!2sug"
                          allowfullscreen="" loading="lazy"
                          referrerpolicy="no-referrer-when-downgrade"></iframe>
                        </iframe>
                    </div>
                </div>

                <!-- Right: Contact Form -->
                <div class="contact-form">

                    <form action="#" method="post">
                        <label for="name">Name:</label>
                        <input type="text" id="name" name="name" required>

                        <label for="email">Email:</label>
                        <input type="email" id="email" name="email" required>

                        <p>Message Purpose:</p>
                        <label><input type="radio" name="purpose" value="general"> General
                            Inquiry</label><br>
                        <label><input type="radio" name="purpose" value="reservation"> Reservation
                            Question</label><br>
                        <label><input type="radio" name="purpose" value="suggestion"> Website
                            Suggestion</label>

                        <label for="message">Message:</label>
                        <textarea id="message" name="message" rows="5" required></textarea>

                        <label>
                            <input type="checkbox" name="newsletter"> Please subscribe me to the
                            monthly newsletter
                        </label>

                        <button type="submit">Get in Touch!</button>
                    </form>
                </div>
            </div>
        </section>

        <!-- Employee Profiles -->
        <section class="employees">
            <h2>We Are Here to Serve You</h2>
            <div class="employee-grid">
                <figure>
                    <img src="images/employee1.jpg" alt="CEO">
                    <figcaption>Allan Ogwal – CEO</figcaption>
                </figure>
                <figure>
                    <img src="images/employee2.jpg" alt="Lead Guide">
                    <figcaption>Sarah Namatovu – Lead Guide</figcaption>
                </figure>
                <figure>
                    <img src="images/employee3.jpg" alt="Trip Coordinator">
                    <figcaption>James Okello – Trip Coordinator</figcaption>
                </figure>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 White Water Rafting Adventures | Allan Ogwal</p>
        <nav class="socialmedia">
            <a href="https://facebook.com"><img src="images/facebook.svg" alt="Facebook Icon"></a>
            <a href="https://linkedin.com"><img src="images/linkedin.svg" alt="LinkedIn Icon"></a>
            <a href="https://instagram.com"><img src="images/instagram.svg"
                  alt="Instagram Icon"></a>
        </nav>
    </footer>
</body>

</html>
